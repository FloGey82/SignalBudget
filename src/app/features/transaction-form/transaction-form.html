<form [formGroup]="transactionForm" (ngSubmit)="submit()" class="form">
  <h2 class="title">
    {{ transactionId() ? 'Edit Transaction' : 'Add Transaction' }}
  </h2>

  <div class="field">
    <label>Amount</label>
    <input type="number" formControlName="amount" placeholder="0.00" />
  </div>

  <div class="field">
    <label>Category</label>
    <select formControlName="category">
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
  </div>

  <div class="field">
    <label>Description</label>
    <input type="text" formControlName="description" placeholder="Groceries, Salary..." />
  </div>

  <div class="field">
    <label>Date</label>
    <input type="date" formControlName="date" />
  </div>

  <div class="actions">
    <button type="button" class="secondary" (click)="cancelEmit()">Cancel</button>

    <button type="submit" class="primary" [disabled]="transactionForm.invalid">Save</button>
  </div>
</form>
