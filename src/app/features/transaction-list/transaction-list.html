<app-drawer [open]="showPanel()" (openChange)="showPanel.set(false)">
  <app-transaction-form
    [transactionId]="editingTransactionId()"
    (save)="showPanel.set(false)"
    (cancel)="showPanel.set(false)"
  />
</app-drawer>
<section class="list">
  <h3>Transactions</h3>

  <app-month-selector />
  <app-sort-buttons />

  @for (t of transactions(); track t.id) {
    <div class="transaction-item">
      <div class="transaction-info">
        <div class="title">{{ t.description }}</div>
        <div class="meta">{{ t.category }} • {{ t.date | date: 'mediumDate' }}</div>
      </div>

      <div class="transaction-actions">
        <span
          class="amount"
          [class.income]="t.category === 'income'"
          [class.expense]="t.category === 'expense'"
        >
          {{ t.amount | currency: 'EUR' }}
        </span>

        <button (click)="editingTransactionId.set(t.id); showPanel.set(true)">✏️</button>

        <button (click)="deleteTransaction(t.id)">🗑</button>
      </div>
    </div>
  } @empty {
    <p class="empty">No transactions yet</p>
  }
</section>

<button class="fab" (click)="editingTransactionId.set(null); showPanel.set(true)">+</button>
